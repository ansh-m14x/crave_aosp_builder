name: Crave Builder(self-hosted)
on:
  workflow_dispatch:
    inputs:
      BASE_PROJECT:
        description: 'Choose a base project:'
        required: true
        default: 'LineageOS 17.1'
        type: choice
        options:
          - 'LineageOS 17.1'
      DEVICE_NAME:
        description: "Device's codename:"
        required: true
        default: "OP4C7D"
      PRODUCT_NAME:
        description: "Product to build:"
        required: true
        default: "lineage_OP4C7D"
      LOCAL_MANIFEST:
        description: "Personal local manifest [repository]:"
        required: true
        default: 'https://github.com/ansh-m14x/aosp_device_oppo_OP4C7D'
      LOCAL_MANIFEST_BRANCH:
        description: "Branch of local manifest:"
        required: true
        default: 'main'
      BUILD_COMMAND:
        description: 'Command for compiling:'
        required: true
        default: 'mka bacon'

jobs:
  prepare:
    name: Prepare for Building
    runs-on: ubuntu-latest
    outputs:
      PROJECTFOLDER: ${{ steps.proj-vars.outputs.PROJECTFOLDER }}
      REPO_INIT: ${{ steps.proj-vars.outputs.REPO_INIT }}
      LUNCH: ${{ steps.proj-vars.outputs.LUNCH }}
      LOCAL_MANIFEST: ${{ steps.proj-vars.outputs.LOCAL_MANIFEST }}
    steps:
    - name: Set Project variables
      id: proj-vars
      run: |
        # LineageOS 17.1 for Oppo A31
        echo "PROJECTFOLDER=/crave-devspaces/Lineage17" >> "$GITHUB_OUTPUT"
        echo "REPO_INIT=repo init -u https://github.com/LineageOS/android.git -b lineage-17.1 --git-lfs --depth=1" >> "$GITHUB_OUTPUT"
        echo "LUNCH=breakfast ${{ github.event.inputs.PRODUCT_NAME }} userdebug" >> "$GITHUB_OUTPUT"
        echo "LOCAL_MANIFEST=git clone ${{ github.event.inputs.LOCAL_MANIFEST }} --depth 1 -b ${{ github.event.inputs.LOCAL_MANIFEST_BRANCH }} .repo/local_manifests" >> "$GITHUB_OUTPUT"

  build:
    timeout-minutes: 1440
    name: Build using foss.crave.io
    needs: prepare
    runs-on: self-hosted
    steps:
    - name: Cleanup & Build Execution
      run: |
        # 1. Purana data saaf karo
        rm -rf *
        
        # 2. Crave Config Fix: Echo use karke file banao taaki parsing error na aaye
        echo "os: android" > crave.conf
        echo "project: ${{ needs.prepare.outputs.PROJECTFOLDER }}" >> crave.conf
        
        # 3. Verify karo ki config sahi bani hai (Logs mein dikhega)
        echo "--- crave.conf content ---"
        cat crave.conf
        echo "--------------------------"
        
        # 4. Crave run command - explicit config path ke saath
        crave run --config $(pwd)/crave.conf --no-patch -- "
          rm -rf .repo/local_manifests/ ; \
          ${{ needs.prepare.outputs.REPO_INIT }} ; \
          ${{ needs.prepare.outputs.LOCAL_MANIFEST }} ; \
          /opt/crave/resync.sh ; \
          source build/envsetup.sh ; \
          ${{ needs.prepare.outputs.LUNCH }} ; \
          make installclean ; \
          ${{ github.event.inputs.BUILD_COMMAND }}
        "
