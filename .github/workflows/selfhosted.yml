name: Crave Builder (Recovery-A31)
on:
  workflow_dispatch:
    inputs:
      DEVICE_NAME:
        description: "Device's codename:"
        required: true
        default: "OP4C7D"
      DEVICE_TREE:
        description: "Device tree repository:"
        required: true
        default: 'https://github.com/ansh-m14x/android-recovery-OP4C7D'
      DEVICE_BRANCH:
        description: "Branch of device tree:"
        required: true
        default: 'main'
      BUILD_COMMAND:
        description: 'Command for compiling:'
        required: true
        default: 'mka recoveryimage'

jobs:
  build:
    timeout-minutes: 1440
    name: Build Recovery on Crave
    runs-on: self-hosted
    steps:
    - name: Build Execution
      run: |
        # Using a stable base project folder on Crave
        export CRAVE_PROJECT="/crave-devspaces/twrp-11"
        export CRAVE_OS="android"

        crave run --no-patch -- "
          # 1. Clean up and setup workspace
          rm -rf .repo/local_manifests/ ; \
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp -b twrp-11 --depth=1 ; \
          
          # 2. Clone your device tree into the correct path
          mkdir -p device/oppo/OP4C7D ; \
          git clone ${{ github.event.inputs.DEVICE_TREE }} -b ${{ github.event.inputs.DEVICE_BRANCH }} device/oppo/OP4C7D ; \
          
          # 3. Resync
          /opt/crave/resync.sh ; \
          
          # 4. Build logic
          source build/envsetup.sh && \
          export ALLOW_MISSING_DEPENDENCIES=true && \
          export LC_ALL=C && \
          lunch omni_OP4C7D-eng && \
          make clean && \
          ${{ github.event.inputs.BUILD_COMMAND }} -j$(nproc --all)
        "
