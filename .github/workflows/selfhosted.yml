name: Crave Builder(self-hosted)
on:
  workflow_dispatch:
    inputs:
      BASE_PROJECT:
        description: 'Choose a base project:'
        required: true
        default: 'LineageOS 17.1'
        type: choice
        options:
          - 'LineageOS 17.1'
          - 'LineageOS 18.1'
          - 'LineageOS 20.0'
          - 'LineageOS 21.0'
          - 'LineageOS 22.1'
          - 'ArrowOS 13.1'
          - 'DerpFest 14.0'
          - 'CipherOS 14'
          - 'PixelOS 15'
          - 'RisingOS 15 Revived'
          - 'LineageOS 16.0'
          - 'CyanogenMOD 14.1'
          - 'AOSP'
      BUILD_DIFFERENT_ROM:
        description: "Command to initialize a different 'repo' project:"
        required: false
        default: "echo 'Build Starting!'"
      REMOVALS:
        description: "Folders to be removed before syncing:"
        required: false
      LOCAL_MANIFEST:
        description: "Personal local manifest [repository or raw]:"
        required: true
        default: 'https://github.com/ansh-m14x/aosp_device_oppo_OP4C7D'
      LOCAL_MANIFEST_BRANCH:
        description: "Personal local manifest's branch:"
        required: false
        default: 'lineage-17.1'
      DEVICE_NAME:
        description: "Device's codename:"
        required: true
        default: "OP4C7D"
      PRODUCT_NAME:
        description: "Product to build:"
        required: true
        default: "lineage_OP4C7D"
      BUILD_COMMAND:
        description: 'Command to be used for compiling:'
        required: true
        default: 'mka bacon'
      BUILD_TYPE:
        description: 'Type of build:'
        required: true
        default: 'userdebug'
        type: choice
        options: 
        - 'eng'
        - 'userdebug'
        - 'user' 
      CLEAN_BUILD:
        description: 'Build with a clean workspace?'
        required: true
        default: 'no'
        type: choice
        options: 
        - 'yes'
        - 'no'

jobs:
  Start-Runner:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up environment
      run: |
        sudo apt-get update
        sudo apt-get install -y tmux
    - name: Configure the 'crave' environment
      run: |
        if [[ $DCDEVSPACE != *1* ]]; then
          mkdir ${HOME}/bin/
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          mv ${PWD}/crave ${HOME}/bin/
          sudo ln -sf /home/${USER}/bin/crave /usr/bin/crave
          envsubst < ${PWD}/crave.conf.sample >> ${PWD}/crave.conf
          rm -rf ${PWD}/crave.conf.sample          
        fi
      env:
        CRAVE_USERNAME: ${{ secrets.CRAVE_USERNAME }}
        CRAVE_TOKEN: ${{ secrets.CRAVE_TOKEN }}
    - name: Run crave devspace
      run: |
        crave ${{ secrets.CRAVE_FLAGS }} devspace -- "if [ -f actions-runner/run.sh ] ; then tmux kill-session -t ghactions || true && tmux new-session -d -s ghactions './actions-runner/run.sh' && echo 'Runner Started'; else echo 'Error! Runner not found!'; exit 1; fi"

  prepare:
    name: Prepare for Building
    runs-on: ubuntu-latest
    steps:
    - name: Check-out to repository
      uses: actions/checkout@v4
    - name: Set Project variables
      id: proj-variables
      run: |
        case "${{ github.event.inputs.BASE_PROJECT }}" in
        "LineageOS 17.1")
          export PROJECTFOLDER="/crave-devspaces/Lineage17"
          export PROJECTID="81"
          export REPO_INIT="repo init -u https://github.com/LineageOS/android.git -b lineage-17.1 --git-lfs --depth=1"
        ;;
        "LineageOS 21.0")
          export PROJECTFOLDER="/crave-devspaces/Lineage21"
          export PROJECTID="72"
          export REPO_INIT="repo init -u https://github.com/LineageOS/android.git -b lineage-21.0 --git-lfs --depth=1"
        ;;
        "LineageOS 18.1")
          export PROJECTFOLDER="/crave-devspaces/Lineage18"
          export PROJECTID="85"
          export REPO_INIT="repo init -u https://github.com/accupara/los18.1.git -b lineage-18.1 --git-lfs --depth=1"
        ;;
        "AOSP")
          export PROJECTFOLDER="/crave-devspaces/AOSP"
          export PROJECTID="35"
          export REPO_INIT="repo init -u https://android.googlesource.com/platform/manifest.git -b master --git-lfs --depth=1"
        ;;
        *)
          # Default case for other ROMs from your original list
          export PROJECTFOLDER="/crave-devspaces/Misc"
          export PROJECTID="35"
          export REPO_INIT="echo 'Using Custom Init'"
        ;;
        esac

        LUNCH="breakfast ${{ github.event.inputs.PRODUCT_NAME }} ${{ github.event.inputs.BUILD_TYPE }}"
        
        if [[ "${{ github.event.inputs.LOCAL_MANIFEST }}" =~ \.xml(/)?$ ]]; then
          LOCAL_MANIFEST="mkdir -p .repo/local_manifests && curl -o .repo/local_manifests/local_manifest.xml ${{ github.event.inputs.LOCAL_MANIFEST }}"
        else
          LOCAL_MANIFEST="git clone ${{ github.event.inputs.LOCAL_MANIFEST }} --depth 1 -b ${{ github.event.inputs.LOCAL_MANIFEST_BRANCH }} .repo/local_manifests"
        fi

        echo "PROJECTFOLDER=$PROJECTFOLDER" >> "$GITHUB_OUTPUT"
        echo "PROJECTID=$PROJECTID"  >> "$GITHUB_OUTPUT"
        echo "REPO_INIT=$REPO_INIT" >> "$GITHUB_OUTPUT"
        echo "LUNCH=$LUNCH" >> "$GITHUB_OUTPUT"
        echo "LOCAL_MANIFEST=$LOCAL_MANIFEST" >> "$GITHUB_OUTPUT"
    outputs:
      PROJECTFOLDER: ${{ steps.proj-variables.outputs.PROJECTFOLDER }}
      PROJECTID: ${{ steps.proj-variables.outputs.PROJECTID }}
      REPO_INIT: ${{ steps.proj-variables.outputs.REPO_INIT }}
      LUNCH: ${{ steps.proj-variables.outputs.LUNCH }}
      LOCAL_MANIFEST: ${{ steps.proj-variables.outputs.LOCAL_MANIFEST }}

  build:
    timeout-minutes: 1440
    name: Build using foss.crave.io
    needs: prepare
    runs-on: self-hosted
    steps:
    - name: Cleanup & Setup
      run: |
        rm -rf *
        PROJECTFOLDER="${{ needs.prepare.outputs.PROJECTFOLDER }}"
        PROJECTID="${{ needs.prepare.outputs.PROJECTID }}"
        REPO_INIT="${{ needs.prepare.outputs.REPO_INIT }}"
        LUNCH="${{ needs.prepare.outputs.LUNCH }}"
        LOCAL_MANIFEST="${{ needs.prepare.outputs.LOCAL_MANIFEST }}"
        
        crave run --no-patch -- "rm -rf .repo/local_manifests/ ${{ github.event.inputs.REMOVALS }} && \
        $REPO_INIT ; \
        $LOCAL_MANIFEST && \
        /opt/crave/resync.sh && \
        source build/envsetup.sh && \
        $LUNCH && \
        make installclean && \
        ${{ github.event.inputs.BUILD_COMMAND }}"

