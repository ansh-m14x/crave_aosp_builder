name: Crave Builder (TWRP-11 Fixed)
on:
  workflow_dispatch:
    inputs:
      DEVICE_NAME:
        description: "Device's codename:"
        required: true
        default: "OP4C7D"
      DEVICE_TREE:
        description: "Device tree repository:"
        required: true
        default: 'https://github.com/ansh-m14x/android-recovery-OP4C7D'
      DEVICE_BRANCH:
        description: "Branch of device tree:"
        required: true
        default: 'main'
      BUILD_COMMAND:
        description: 'Command for compiling:'
        required: true
        default: 'mka recoveryimage'

jobs:
  prepare:
    name: Prepare for Building
    runs-on: ubuntu-latest
    outputs:
      PROJECTFOLDER: ${{ steps.proj-vars.outputs.PROJECTFOLDER }}
      PROJECTID: ${{ steps.proj-vars.outputs.PROJECTID }}
      REPO_INIT: ${{ steps.proj-vars.outputs.REPO_INIT }}
      LUNCH: ${{ steps.proj-vars.outputs.LUNCH }}
      CLONE_TREES: ${{ steps.proj-vars.outputs.CLONE_TREES }}
    steps:
    - name: Set Project variables
      id: proj-vars
      run: |
        # Using ID 81 (Lineage 17/11 base) as it has the best legacy support
        echo "PROJECTFOLDER=/crave-devspaces/twrp-11" >> "$GITHUB_OUTPUT"
        echo "PROJECTID=81" >> "$GITHUB_OUTPUT"
        echo "REPO_INIT=repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp -b twrp-11 --depth=1" >> "$GITHUB_OUTPUT"
        echo "LUNCH=lunch omni_OP4C7D-eng" >> "$GITHUB_OUTPUT"
        
        # Logic to clone your tree specifically into device/oppo/OP4C7D
        echo "CLONE_TREES=mkdir -p device/oppo/OP4C7D && git clone ${{ github.event.inputs.DEVICE_TREE }} -b ${{ github.event.inputs.DEVICE_BRANCH }} device/oppo/OP4C7D" >> "$GITHUB_OUTPUT"

  build:
    timeout-minutes: 1440
    name: Build on foss.crave.io
    needs: prepare
    runs-on: self-hosted
    steps:
    - name: Cleanup & Devspace Setup
      run: |
        rm -rf *
        export CRAVE_PROJECT="${{ needs.prepare.outputs.PROJECTFOLDER }}"
        export CRAVE_OS="android"
        
        # This part ensures Crave recognizes the root/url correctly
        if grep -q "$CRAVE_PROJECT" <(crave clone list --json | jq -r '.clones[]."Cloned At"'); then
          crave clone destroy -y $CRAVE_PROJECT || echo "Cleanup failed"
        fi
        crave clone create --projectID ${{ needs.prepare.outputs.PROJECTID }} $CRAVE_PROJECT || echo "Clone failed"

    - name: Build Execution
      run: |
        cd ${{ needs.prepare.outputs.PROJECTFOLDER }}
        export CRAVE_OS="android"
        export CRAVE_PROJECT="${{ needs.prepare.outputs.PROJECTFOLDER }}"

        crave run --no-patch -- "
          # Clean old manifests and setup repo
          rm -rf .repo/local_manifests/ ; \
          ${{ needs.prepare.outputs.REPO_INIT }} ; \
          
          # Use your clone logic instead of local_manifests to avoid sync errors
          ${{ needs.prepare.outputs.CLONE_TREES }} ; \
          
          /opt/crave/resync.sh ; \
          
          # Build environment setup
          source build/envsetup.sh && \
          export ALLOW_MISSING_DEPENDENCIES=true && \
          export LC_ALL=C && \
          ${{ needs.prepare.outputs.LUNCH }} && \
          make installclean && \
          ${{ github.event.inputs.BUILD_COMMAND }} -j\$(nproc --all)
        "
